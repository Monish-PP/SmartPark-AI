version: "3.9"

services:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000/api
      - VITE_GOOGLE_MAPS_KEY=${GOOGLE_MAPS_KEY}
      - VITE_RAZORPAY_KEY=${RAZORPAY_KEY_ID}
    depends_on:
      - backend
    networks:
      - smartpark_net

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    volumes:
      - ../backend:/app
      - model_artifacts:/app/ml_models
    networks:
      - smartpark_net

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    command: celery -A smartpark worker --loglevel=info
    env_file:
      - ../backend/.env
    depends_on:
      - redis
      - backend
    volumes:
      - ../backend:/app
      - model_artifacts:/app/ml_models
    networks:
      - smartpark_net

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    command: celery -A smartpark beat --loglevel=info
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    networks:
      - smartpark_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - smartpark_net

  # ── Edge AI Occupancy Service ───────────────────────────────────────────────
  occupancy-service:
    build:
      context: ../occupancy-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../occupancy-service/.env
    depends_on:
      - backend
    networks:
      - smartpark_net

networks:
  smartpark_net:
    driver: bridge

volumes:
  model_artifacts:
